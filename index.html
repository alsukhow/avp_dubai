<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVP Sports Academy LLC · Financial Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
/* ============================================================
   AVP SPORTS ACADEMY · FINANCIAL DASHBOARD
   Aesthetic: Editorial Institutional
   ============================================================ */

:root {
  --bg: #FAFAF7;
  --surface: #FFFFFF;
  --surface-alt: #F4F2EC;
  --border: #E7E4DC;
  --border-strong: #D6D2C7;
  --text: #1A1A1A;
  --text-secondary: #4B4A45;
  --text-muted: #8A877F;
  --header-bg: #0F1419;
  --header-text: #F2EFE7;
  --header-muted: #8A867B;
  --accent: #A8431B;
  --accent-soft: #FBEEDE;
  --positive: #166534;
  --positive-soft: #DCFCE7;
  --negative: #991B1B;
  --negative-soft: #FEE2E2;
  --warn: #B45309;
  --warn-soft: #FEF3C7;
  --shadow-sm: 0 1px 2px rgba(15, 20, 25, 0.04);
  --shadow-md: 0 1px 3px rgba(15, 20, 25, 0.06), 0 1px 2px rgba(15, 20, 25, 0.04);
  --radius: 10px;
  --radius-sm: 6px;
  --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: 'Fraunces', Georgia, serif;
  --font-mono: 'JetBrains Mono', Menlo, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.hidden { display: none !important; }

/* ===== PASSWORD OVERLAY ===== */
.overlay {
  position: fixed; inset: 0;
  background: var(--header-bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  padding: 24px;
}
.overlay-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 40px 36px;
  width: 100%; max-width: 380px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.overlay-brand {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 22px;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
  color: var(--text);
}
.overlay-tag {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 28px;
}
.overlay label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.02em;
  margin-bottom: 8px;
}
.overlay input {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  font-family: var(--font-sans);
  font-size: 14px;
  background: var(--surface);
  color: var(--text);
  transition: border-color 0.15s;
}
.overlay input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.overlay button {
  width: 100%;
  margin-top: 16px;
  padding: 11px 14px;
  background: var(--header-bg);
  color: var(--header-text);
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.15s;
}
.overlay button:hover { background: #1F2933; }
.overlay-error {
  color: var(--negative);
  font-size: 12px;
  margin-top: 10px;
  min-height: 18px;
}

/* ===== HEADER ===== */
header {
  background: var(--header-bg);
  color: var(--header-text);
  padding: 20px 32px;
  border-bottom: 1px solid #1F2933;
}
.header-inner {
  max-width: 1440px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
}
.brand {
  display: flex; flex-direction: column;
}
.brand-name {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 22px;
  letter-spacing: -0.01em;
  line-height: 1.2;
}
.brand-tag {
  font-size: 11px;
  color: var(--header-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 2px;
}
.header-meta {
  display: flex; align-items: center; gap: 20px;
  font-size: 12px; color: var(--header-muted);
}
.header-meta .label { display: block; letter-spacing: 0.06em; text-transform: uppercase; font-size: 10px; }
.header-meta .value { color: var(--header-text); font-family: var(--font-mono); font-size: 12px; }

/* ===== NAV TABS ===== */
nav.tabs {
  position: sticky; top: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}
.tabs-inner {
  max-width: 1440px; margin: 0 auto;
  display: flex;
  padding: 0 32px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs-inner::-webkit-scrollbar { display: none; }
.tab-btn {
  background: none; border: none; cursor: pointer;
  padding: 14px 20px;
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.02em;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--text);
  border-bottom-color: var(--accent);
}

/* ===== FILTER BAR ===== */
.filter-bar {
  background: var(--surface-alt);
  border-bottom: 1px solid var(--border);
  padding: 14px 32px;
}
.filter-inner {
  max-width: 1440px; margin: 0 auto;
  display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
}
.filter-group {
  display: flex; align-items: center; gap: 8px;
}
.filter-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.pill-group {
  display: flex; gap: 4px; flex-wrap: wrap;
}
.pill {
  padding: 5px 11px;
  font-size: 12px;
  font-family: var(--font-sans);
  font-weight: 500;
  background: var(--surface);
  color: var(--text-secondary);
  border: 1px solid var(--border-strong);
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.12s;
}
.pill:hover { border-color: var(--text-muted); color: var(--text); }
.pill.active {
  background: var(--header-bg);
  color: var(--header-text);
  border-color: var(--header-bg);
}
.filter-bar select {
  font-family: var(--font-sans);
  font-size: 12px;
  padding: 5px 10px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
}
.btn-link {
  background: none; border: none; cursor: pointer;
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--accent);
  text-decoration: underline;
  text-underline-offset: 3px;
  margin-left: auto;
}
.btn-link:hover { color: var(--text); }

/* ===== MAIN ===== */
main {
  max-width: 1440px; margin: 0 auto;
  padding: 28px 32px 60px;
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Loading / Error */
.state-block {
  text-align: center;
  padding: 80px 32px;
  color: var(--text-muted);
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.state-block .error-title {
  font-family: var(--font-display);
  font-size: 20px;
  color: var(--text);
  margin-bottom: 8px;
}
.state-block button {
  margin-top: 18px;
  padding: 9px 18px;
  background: var(--header-bg);
  color: var(--header-text);
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-sans);
  font-size: 13px;
  cursor: pointer;
}

/* ===== SECTION TITLES ===== */
.section-title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 24px;
  letter-spacing: -0.01em;
  color: var(--text);
  margin-bottom: 6px;
}
.section-sub {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 22px;
}
.subsection-title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 17px;
  color: var(--text);
  margin-bottom: 14px;
  letter-spacing: -0.005em;
}

/* ===== KPI CARDS ===== */
.kpi-grid {
  display: grid;
  gap: 12px;
  grid-template-columns: repeat(4, 1fr);
  margin-bottom: 24px;
}
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.kpi-card.accent::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--accent);
}
.kpi-card.positive::before { background: var(--positive); content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.kpi-card.negative::before { background: var(--negative); content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.kpi-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.kpi-value {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 26px;
  line-height: 1.1;
  letter-spacing: -0.015em;
  color: var(--text);
}
.kpi-value.pos { color: var(--positive); }
.kpi-value.neg { color: var(--negative); }
.kpi-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 6px;
  font-family: var(--font-mono);
}

/* ===== PANELS / CHART CARDS ===== */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 24px;
  margin-bottom: 16px;
}
.panel-header {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
}
.panel-title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 16px;
  color: var(--text);
}
.panel-sub {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.chart-wrap {
  position: relative;
  height: 320px;
  width: 100%;
}
.chart-wrap.tall { height: 380px; }
.chart-wrap.short { height: 240px; }

.grid-2 {
  display: grid;
  grid-template-columns: 1.5fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.grid-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

/* ===== INSIGHT CARDS ===== */
.insights-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
.insight {
  background: var(--accent-soft);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
}
.insight.pos { background: var(--positive-soft); border-left-color: var(--positive); }
.insight.neg { background: var(--negative-soft); border-left-color: var(--negative); }
.insight.warn { background: var(--warn-soft); border-left-color: var(--warn); }
.insight-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.insight-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.45;
}
.insight-text strong {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 15px;
}

/* ===== TABLES ===== */
.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
}
table.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.data-table thead {
  background: var(--surface-alt);
}
.data-table th {
  padding: 11px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
.data-table th.numeric { text-align: right; }
.data-table th:hover { color: var(--text); }
.data-table th.sorted::after {
  content: ''; display: inline-block; margin-left: 6px;
  border: 4px solid transparent;
  border-top-color: var(--accent);
  vertical-align: middle;
  position: relative; top: 2px;
}
.data-table th.sorted.asc::after {
  border-top-color: transparent;
  border-bottom-color: var(--accent);
  top: -2px;
}
.data-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: top;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: rgba(168, 67, 27, 0.03); }
.data-table td.numeric {
  text-align: right;
  font-family: var(--font-mono);
  font-size: 12px;
  font-variant-numeric: tabular-nums;
}
.data-table td.numeric.pos { color: var(--positive); }
.data-table td.numeric.neg { color: var(--negative); }
.data-table td.muted { color: var(--text-muted); font-size: 12px; }
.data-table tr.row-credit td { background: rgba(22, 101, 52, 0.025); }
.data-table tr.row-debit td { background: rgba(153, 27, 27, 0.02); }
.data-table tr.row-net-neg td { background: rgba(153, 27, 27, 0.04); }
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.04em;
  background: var(--surface-alt);
  color: var(--text-secondary);
}
.badge.fc { background: #DBEAFE; color: #1E3A8A; }
.badge.rs { background: #FEF3C7; color: #92400E; }
.badge.avp { background: #E5E7EB; color: #374151; }
.badge.ubo { background: #FCE7F3; color: #9D174D; }

/* Table controls */
.table-controls {
  display: flex; gap: 12px; align-items: center;
  margin-bottom: 12px; flex-wrap: wrap;
}
.search-input {
  flex: 1; min-width: 200px;
  padding: 8px 12px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  font-family: var(--font-sans);
  font-size: 13px;
  background: var(--surface);
}
.search-input:focus {
  outline: none; border-color: var(--accent);
}
.btn {
  padding: 8px 14px;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.12s;
}
.btn:hover { background: var(--surface-alt); }
.btn.primary {
  background: var(--header-bg);
  color: var(--header-text);
  border-color: var(--header-bg);
}
.btn.primary:hover { background: #1F2933; }
.row-count {
  font-size: 12px;
  color: var(--text-muted);
}
.pagination {
  display: flex; gap: 8px; align-items: center; justify-content: flex-end;
  margin-top: 12px;
  font-size: 13px;
  color: var(--text-secondary);
}
.pagination button {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  font-family: var(--font-sans);
  font-size: 12px;
  cursor: pointer;
}
.pagination button:disabled { opacity: 0.4; cursor: not-allowed; }

/* Callout */
.callout {
  background: var(--accent-soft);
  border-left: 3px solid var(--accent);
  padding: 14px 18px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin-bottom: 16px;
}
.callout-title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 15px;
  color: var(--text);
  margin-bottom: 4px;
}
.callout-text {
  font-size: 13px;
  color: var(--text-secondary);
}

/* Project sub-tabs */
.subtabs {
  display: flex; gap: 4px;
  padding: 4px;
  background: var(--surface-alt);
  border-radius: var(--radius-sm);
  margin-bottom: 18px;
  width: fit-content;
}
.subtab {
  padding: 7px 14px;
  background: none;
  border: none;
  border-radius: 4px;
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.12s;
}
.subtab:hover { color: var(--text); }
.subtab.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

/* Sub-row in vendor table (expanded) */
.subrow td {
  background: var(--surface-alt) !important;
  padding: 0 !important;
  border-bottom: 1px solid var(--border) !important;
}
.subrow-inner {
  padding: 12px 14px 16px;
}
.subrow-inner table {
  width: 100%; font-size: 12px;
}
.subrow-inner th { background: transparent; font-size: 10px; padding: 6px 10px; }
.subrow-inner td { padding: 6px 10px; border-bottom: 1px solid var(--border-strong); }

/* Warning icon */
.warn-icon { color: var(--warn); margin-right: 4px; }

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
  .grid-2 { grid-template-columns: 1fr; }
  .grid-3 { grid-template-columns: 1fr 1fr; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  header { padding: 16px 16px; }
  .header-meta { display: none; }
  .brand-name { font-size: 18px; }
  .tabs-inner { padding: 0 16px; }
  .tab-btn { padding: 12px 14px; font-size: 12px; }
  .filter-bar { padding: 12px 16px; }
  main { padding: 20px 16px 40px; }
  .panel { padding: 16px; }
  .kpi-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .kpi-card { padding: 14px 16px; }
  .kpi-value { font-size: 22px; }
  .grid-3 { grid-template-columns: 1fr; }
  .chart-wrap { height: 280px; }
  .chart-wrap.tall { height: 320px; }
  .insights-grid { grid-template-columns: 1fr; }
  .section-title { font-size: 20px; }
  .data-table th, .data-table td { padding: 8px 10px; font-size: 12px; }
  .table-controls { flex-direction: column; align-items: stretch; }
  .search-input { min-width: unset; }
}
@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ============ PASSWORD OVERLAY ============ -->
<div id="password-overlay" class="overlay">
  <div class="overlay-card">
    <div class="overlay-brand">AVP Sports Academy LLC</div>
    <div class="overlay-tag">Financial Dashboard</div>
    <label for="pw-input">Access password</label>
    <input id="pw-input" type="password" autocomplete="off" />
    <button id="pw-submit">Sign in</button>
    <div id="pw-error" class="overlay-error"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="brand-name">AVP Sports Academy LLC</div>
        <div class="brand-tag">Financial Dashboard · FAB Account · AED</div>
      </div>
      <div class="header-meta">
        <div>
          <div class="label">Data refreshed</div>
          <div class="value" id="meta-refreshed">—</div>
        </div>
        <div>
          <div class="label">Period</div>
          <div class="value" id="meta-period">—</div>
        </div>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <div class="tabs-inner">
      <button class="tab-btn active" data-tab="overview">Overview</button>
      <button class="tab-btn" data-tab="cashflow">Cash Flow</button>
      <button class="tab-btn" data-tab="projects">Projects</button>
      <button class="tab-btn" data-tab="vendors">Vendors</button>
      <button class="tab-btn" data-tab="transactions">Transactions</button>
    </div>
  </nav>

  <div class="filter-bar">
    <div class="filter-inner">
      <div class="filter-group">
        <span class="filter-label">Period</span>
        <select id="filter-months-from"></select>
        <span style="color:var(--text-muted);font-size:12px">→</span>
        <select id="filter-months-to"></select>
      </div>

<script>

// ============================================================

const CONFIG = {

// ============================================================

const COLS = {

function pick(row, candidates) {

}
// ============================================================
// STATE
// ============================================================
const state = {

  vendorPage: 1,

  vendorSearch: '',
  vendorSort: { key: 'absTotal', dir: 'desc' },
  vendorExpanded: null,
  txPage: 1,
  txPageSize: 25,
  txSearch: '',
  txSort: { key: 'date', dir: 'desc' },
  projectsView: 'all',
  filterDebounceTimer: null
};

const PROJECT_LABELS = {
  FC: 'Football Club',
  RS: 'Racket Sports',
  AVP: 'Shared (company-level)',
  UBO: 'Owner (UBO)'
};
const PROJECT_ORDER = ['FC', 'RS', 'AVP', 'UBO'];
const TYPE_ORDER = ['Sales', 'Refund', 'Loan', 'Opex', 'Capex'];

const COLORS = {
  FC: '#1E40AF',
  RS: '#B45309',
  AVP: '#525252',
  UBO: '#9D174D',
  pos: '#166534',
  neg: '#991B1B',
  Sales: '#166534',
  Refund: '#65A30D',
  Loan: '#0E7490',
  Opex: '#991B1B',
  Capex: '#7C2D12',
  Neutral: '#A8431B'
};

// ============================================================
// FORMATTING HELPERS
// ============================================================
function formatAED(value, opts = {}) {
  if (value == null || isNaN(value)) return '—';
  const sign = value < 0 ? '-' : '';
  const abs = Math.abs(value);
  let str;
  if (opts.compact && abs >= 1000) {
    if (abs >= 1_000_000) str = (abs / 1_000_000).toFixed(2) + 'M';
    else if (abs >= 1000) str = (abs / 1000).toFixed(1) + 'K';
    else str = abs.toFixed(0);
  } else {
    str = abs.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }
  return `AED ${sign}${str}`;
}
function formatNumber(value) {
  if (value == null || isNaN(value)) return '—';
  return value.toLocaleString('en-US');
}
function formatPercent(value, digits = 1) {
  if (value == null || isNaN(value)) return '—';
  return value.toFixed(digits) + '%';
}
function formatMonthLabel(monthKey) {
  // "2025-10" -> "Oct 2025"
  const [y, m] = monthKey.split('-');
  const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${names[parseInt(m) - 1]} ${y}`;
}
function formatDate(d) {
  if (!d) return '—';
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

// ============================================================
// PASSWORD GATE

function setupPassword() {

// ============================================================
// INIT (after auth)
// ============================================================
async function init() {
  await loadData();
}

async function loadData() {
  showState('loading');
  try {
    const response = await fetch(CONFIG.DATA_URL, { cache: 'no-store' });
    if (!response.ok) throw new Error(`HTTP ${response.status} when fetching data`);
    const csvText = await response.text();
    const parsed = parseCSV(csvText);
    if (parsed.length === 0) throw new Error('No transaction rows found in the data source.');
    state.rawData = normalizeData(parsed);
    if (state.rawData.length === 0) throw new Error('No valid transactions after normalization.');
    state.monthsAvailable = buildMonthsAvailable(state.rawData);
    state.filters.monthFrom = state.monthsAvailable[0];
    state.filters.monthTo = state.monthsAvailable[state.monthsAvailable.length - 1];
    state.filters.projects = new Set();
    state.filters.types = new Set();
    renderFilters();
    updateHeaderMeta();
    showState('ok');
    renderActiveTab();
  } catch (err) {
    console.error(err);
    document.getElementById('error-message').textContent = err.message;
    showState('error');

}

function showState(s) {
  document.getElementById('state-loading').classList.toggle('hidden', s !== 'loading');
  document.getElementById('state-error').classList.toggle('hidden', s !== 'error');
  document.getElementById('state-empty').classList.toggle('hidden', s !== 'empty');

    el.style.visibility = (s === 'ok') ? 'visible' : 'hidden';
  });
}

// ============================================================
// CSV PARSING + NORMALIZATION
// ============================================================
function parseCSV(csvText) {
  const result = Papa.parse(csvText, { skipEmptyLines: false });
  if (result.errors && result.errors.length) {
    // PapaParse rarely fails outright; we log but try to proceed
    console.warn('CSV parse warnings:', result.errors.slice(0, 3));
  }
  const rows = result.data || [];

  // Find header row by scanning for "Value Date"
  let headerIdx = -1;
  for (let i = 0; i < Math.min(rows.length, 30); i++) {
    const row = rows[i] || [];
    if (row.some(cell => cell != null && String(cell).trim() === 'Value Date')) {
      headerIdx = i; break;
    }
  }
  if (headerIdx === -1) {
    throw new Error('Could not find header row containing "Value Date". Make sure the published CSV is from the "Bank Working" sheet.');
  }

  const headers = (rows[headerIdx] || []).map(h => h == null ? '' : String(h).trim());
  const dataRows = [];
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row) continue;
    // Skip entirely-empty rows
    const hasContent = row.some(c => c != null && String(c).trim() !== '');
    if (!hasContent) continue;
    const obj = {};
    headers.forEach((h, j) => {
      if (h) obj[h] = row[j];
    });
    if (obj['Value Date'] != null && String(obj['Value Date']).trim() !== '') {
      dataRows.push(obj);
    }
  }
  return dataRows;
}

function parseFlexibleDate(str) {
  if (!str) return null;
  const s = String(str).trim();
  // "17 Oct 2025"
  const months = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const parts = s.split(/[\s,\-\/]+/);
  if (parts.length === 3) {
    let day, mon, year;
    if (/^\d+$/.test(parts[0]) && /^[A-Za-z]/.test(parts[1])) {
      day = parseInt(parts[0]); mon = months[parts[1].slice(0,3).toLowerCase()]; year = parseInt(parts[2]);
    } else if (/^[A-Za-z]/.test(parts[0])) {
      mon = months[parts[0].slice(0,3).toLowerCase()]; day = parseInt(parts[1]); year = parseInt(parts[2]);
    } else if (/^\d{4}$/.test(parts[0])) {
      year = parseInt(parts[0]); mon = parseInt(parts[1]) - 1; day = parseInt(parts[2]);
    } else {
      day = parseInt(parts[0]); mon = parseInt(parts[1]) - 1; year = parseInt(parts[2]);
      if (year < 100) year += 2000;
    }
    if (!isNaN(day) && mon != null && !isNaN(mon) && !isNaN(year)) {
      const d = new Date(year, mon, day);
      if (!isNaN(d.getTime())) return d;
    }
  }
  const d2 = new Date(s);
  return isNaN(d2.getTime()) ? null : d2;
}

function parseAmount(value) {
  if (value == null) return 0;
  const s = String(value).trim();
  if (s === '' || s === '-') return 0;
  // Remove commas, spaces
  const cleaned = s.replace(/,/g, '').replace(/\s/g, '');
  const n = parseFloat(cleaned);
  return isNaN(n) ? 0 : n;
}

function normalizeType(raw) {
  if (raw == null) return '';
  const s = String(raw).trim().toLowerCase();
  if (!s) return '';
  if (s.startsWith('opex')) return 'Opex';
  if (s.startsWith('capex')) return 'Capex';
  if (s.startsWith('sales')) return 'Sales';
  if (s.startsWith('refund')) return 'Refund';
  if (s.startsWith('loan')) return 'Loan';
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function normalizeProject(raw) {
  if (raw == null) return '';
  const s = String(raw).trim().toUpperCase();
  if (['FC','RS','AVP','UBO'].includes(s)) return s;
  return s;
}

function normalizeData(rows) {
  const out = [];
  rows.forEach((row, idx) => {
    const debit  = parseAmount(pick(row, COLS.debit));
    const credit = parseAmount(pick(row, COLS.credit));
    const amount = credit + debit;

    const date = parseFlexibleDate(pick(row, COLS.date));
    if (!date) return;

    const monthKey = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;

    out.push({
      id: idx,
      num: parseInt(pick(row, COLS.num)) || (idx + 1),
      date, monthKey, debit, credit, amount,
      runningBalance: parseAmount(pick(row, COLS.runningBal)),
      type:        normalizeType(pick(row, COLS.category)),  // high-level
      remarks:     (pick(row, COLS.subtype)   || '').toString().trim(), // granular
      class:       (pick(row, COLS.classField)|| '').toString().trim().toUpperCase(),
      project:     normalizeProject(pick(row, COLS.project)),
      vendor:      (pick(row, COLS.vendor)    || '').toString().trim(),
      invoice:     (pick(row, COLS.invoice)   || '').toString().trim(),
      comments:    (pick(row, COLS.comments)  || '').toString().trim(),
      detailsNeeded:(pick(row, COLS.needsDetail)|| '').toString().trim(),
      qbStatus:    (pick(row, COLS.qbStatus)  || '').toString().trim()
    });
  });
  out.sort((a, b) => a.date - b.date || a.num - b.num);
  return out;
}

function buildMonthsAvailable(data) {
  const set = new Set(data.map(r => r.monthKey));
  return Array.from(set).sort();
}

// ============================================================
// FILTERS
// ============================================================
function renderFilters() {
  const fromSel = document.getElementById('filter-months-from');
  const toSel = document.getElementById('filter-months-to');
  fromSel.innerHTML = '';
  toSel.innerHTML = '';
  state.monthsAvailable.forEach(mk => {
    const o1 = document.createElement('option');
    o1.value = mk; o1.textContent = formatMonthLabel(mk);
    if (mk === state.filters.monthFrom) o1.selected = true;
    fromSel.appendChild(o1);
    const o2 = document.createElement('option');
    o2.value = mk; o2.textContent = formatMonthLabel(mk);
    if (mk === state.filters.monthTo) o2.selected = true;
    toSel.appendChild(o2);
  });
  fromSel.onchange = () => { state.filters.monthFrom = fromSel.value; debouncedRender(); };
  toSel.onchange = () => { state.filters.monthTo = toSel.value; debouncedRender(); };

  // Project pills
  const projContainer = document.getElementById('filter-projects');
  projContainer.innerHTML = '';
  const allProj = document.createElement('button');
  allProj.className = 'pill' + (state.filters.projects.size === 0 ? ' active' : '');
  allProj.textContent = 'All';
  allProj.onclick = () => { state.filters.projects.clear(); renderFilters(); debouncedRender(); };
  projContainer.appendChild(allProj);
  PROJECT_ORDER.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (state.filters.projects.has(p) ? ' active' : '');
    btn.textContent = p;
    btn.title = PROJECT_LABELS[p];
    btn.onclick = () => {
      if (state.filters.projects.has(p)) state.filters.projects.delete(p);
      else state.filters.projects.add(p);
      renderFilters(); debouncedRender();
    };
    projContainer.appendChild(btn);
  });

  // Type pills
  const typeContainer = document.getElementById('filter-types');
  typeContainer.innerHTML = '';
  const allType = document.createElement('button');
  allType.className = 'pill' + (state.filters.types.size === 0 ? ' active' : '');
  allType.textContent = 'All';
  allType.onclick = () => { state.filters.types.clear(); renderFilters(); debouncedRender(); };
  typeContainer.appendChild(allType);
  TYPE_ORDER.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (state.filters.types.has(t) ? ' active' : '');
    btn.textContent = t;
    btn.onclick = () => {
      if (state.filters.types.has(t)) state.filters.types.delete(t);
      else state.filters.types.add(t);
      renderFilters(); debouncedRender();
    };
    typeContainer.appendChild(btn);
  });

  document.getElementById('filter-reset').onclick = () => {
    state.filters.monthFrom = state.monthsAvailable[0];
    state.filters.monthTo = state.monthsAvailable[state.monthsAvailable.length - 1];
    state.filters.projects.clear();
    state.filters.types.clear();
    renderFilters(); debouncedRender();
  };
}

function applyFilters(data) {
  const f = state.filters;
  return data.filter(r => {
    if (f.monthFrom && r.monthKey < f.monthFrom) return false;
    if (f.monthTo && r.monthKey > f.monthTo) return false;
    if (f.projects.size > 0 && !f.projects.has(r.project)) return false;
    if (f.types.size > 0 && !f.types.has(r.type)) return false;
    return true;
  });
}

function debouncedRender() {
  if (state.filterDebounceTimer) clearTimeout(state.filterDebounceTimer);
  state.filterDebounceTimer = setTimeout(() => renderActiveTab(), 150);
}

// ============================================================
// TAB SWITCHING
// ============================================================
function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.getAttribute('data-tab');
      state.currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
      document.querySelectorAll('.tab-content').forEach(c => {
        c.classList.toggle('active', c.id === 'tab-' + tab);
      });
      renderActiveTab();
    });
  });
}

function destroyChartsIn(tabId) {
  const tabEl = document.getElementById(tabId);
  if (!tabEl) return;
  tabEl.querySelectorAll('canvas').forEach(c => {
    if (state.charts[c.id]) {
      state.charts[c.id].destroy();
      delete state.charts[c.id];
    }
  });
}

function createChart(canvasId, config) {
  if (state.charts[canvasId]) {
    state.charts[canvasId].destroy();
  }
  const canvas = document.getElementById(canvasId);
  if (!canvas) return null;
  const ctx = canvas.getContext('2d');
  // Common defaults
  const defaults = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { labels: { font: { family: 'DM Sans', size: 12 }, color: '#4B4A45', boxWidth: 12, padding: 14 } },
      tooltip: {
        backgroundColor: '#0F1419',
        titleFont: { family: 'DM Sans', size: 12, weight: '500' },
        bodyFont: { family: 'JetBrains Mono', size: 12 },
        padding: 10, cornerRadius: 6, displayColors: true,
        callbacks: {
          label: function(ctx) {
            const lbl = ctx.dataset.label || '';
            let v;
            if (ctx.parsed == null) v = ctx.raw;
            else if (typeof ctx.parsed === 'object') {
              const isHorizontal = ctx.chart.options.indexAxis === 'y';
              v = isHorizontal ? ctx.parsed.x : ctx.parsed.y;
            } else v = ctx.parsed;
            return lbl ? `${lbl}: ${formatAED(v)}` : formatAED(v);
          }
        }
      }
    },
    scales: {
      x: { grid: { display: false }, ticks: { font: { family: 'DM Sans', size: 11 }, color: '#8A877F' } },
      y: { grid: { color: '#E7E4DC', drawBorder: false }, ticks: { font: { family: 'JetBrains Mono', size: 11 }, color: '#8A877F', callback: v => formatAED(v, { compact: true }) } }
    }
  };
  // Deep merge: option-by-option for common cases
  config.options = config.options || {};
  config.options.responsive = true;
  config.options.maintainAspectRatio = false;
  config.options.plugins = Object.assign({}, defaults.plugins, config.options.plugins || {});
  if (config.options.plugins.legend) {
    config.options.plugins.legend = Object.assign({}, defaults.plugins.legend, config.options.plugins.legend);
  }
  if (config.options.plugins.tooltip) {
    config.options.plugins.tooltip = Object.assign({}, defaults.plugins.tooltip, config.options.plugins.tooltip);
  }
  // Skip scales entirely for chart types that don't support them
  const noScalesTypes = ['doughnut', 'pie', 'polarArea', 'radar'];
  if (noScalesTypes.includes(config.type)) {
    delete config.options.scales;
  } else if (config.options.scales !== false) {
    config.options.scales = Object.assign({}, defaults.scales, config.options.scales || {});
  } else {
    delete config.options.scales;
  }
  state.charts[canvasId] = new Chart(ctx, config);
  return state.charts[canvasId];
}

// ============================================================
// HEADER META
// ============================================================
function updateHeaderMeta() {
  document.getElementById('meta-refreshed').textContent = new Date().toLocaleString('en-GB', {
    day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
  });
  if (state.monthsAvailable.length > 0) {
    const from = formatMonthLabel(state.monthsAvailable[0]);
    const to = formatMonthLabel(state.monthsAvailable[state.monthsAvailable.length - 1]);
    document.getElementById('meta-period').textContent = `${from} – ${to}`;
  }
}

// ============================================================
// AGGREGATION HELPERS
// ============================================================
function sumInflows(rows) {
  return rows.reduce((s, r) => s + r.credit, 0);
}
function sumOutflows(rows) {
  return rows.reduce((s, r) => s + r.debit, 0); // already negative
}
function netFlow(rows) {
  return sumInflows(rows) + sumOutflows(rows);
}
function groupBy(rows, keyFn) {
  const map = new Map();
  rows.forEach(r => {
    const k = keyFn(r);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(r);
  });
  return map;
}
function monthsInRange(from, to) {
  if (!from || !to) return [];
  const out = [];
  let [y, m] = from.split('-').map(Number);
  const [ty, tm] = to.split('-').map(Number);
  while (y < ty || (y === ty && m <= tm)) {
    out.push(`${y}-${String(m).padStart(2,'0')}`);
    m++;
    if (m > 12) { m = 1; y++; }
  }
  return out;
}

// ============================================================
// TAB: OVERVIEW
// ============================================================
function renderActiveTab() {
  const filtered = applyFilters(state.rawData);
  // hide all empty state
  document.getElementById('state-empty').classList.add('hidden');
  if (filtered.length === 0) {
    // Show empty inside content area
    const el = document.getElementById('tab-' + state.currentTab);
    destroyChartsIn('tab-' + state.currentTab);
    el.innerHTML = '<div class="state-block"><div class="error-title">No data for selected filters</div><div style="font-size:13px">Try widening the date range or resetting filters.</div></div>';
    return;
  }
  if (state.currentTab === 'overview') renderOverview(filtered);
  else if (state.currentTab === 'cashflow') renderCashFlow(filtered);
  else if (state.currentTab === 'projects') renderProjects(filtered);
  else if (state.currentTab === 'vendors') renderVendors(filtered);
  else if (state.currentTab === 'transactions') renderTransactions(filtered);
}

function renderOverview(rows) {
  const el = document.getElementById('tab-overview');
  destroyChartsIn('tab-overview');

  const inflows = sumInflows(rows);
  const outflows = sumOutflows(rows); // negative
  const net = netFlow(rows);

  // Closing balance: last running balance among full unfiltered data within "to" month
  // (more accurate than recomputing from filtered slice)
  const closing = computeClosingBalance();

  const monthKeys = monthsInRange(state.filters.monthFrom, state.filters.monthTo);
  const monthCount = monthKeys.length || 1;
  const avgIn = inflows / monthCount;
  const avgOut = outflows / monthCount;

  // Months with positive net
  const byMonth = groupBy(rows, r => r.monthKey);
  let posMonths = 0;
  monthKeys.forEach(mk => {
    const mr = byMonth.get(mk) || [];
    if (netFlow(mr) > 0) posMonths++;
  });

  el.innerHTML = `
    <div class="section-title">Overview</div>
    <div class="section-sub">Cash performance across ${monthCount} ${monthCount === 1 ? 'month' : 'months'} · ${formatMonthLabel(state.filters.monthFrom)} → ${formatMonthLabel(state.filters.monthTo)}</div>

        <div class="kpi-value pos">${formatAED(inflows)}</div>
        <div class="kpi-sub">${rows.filter(r => r.credit > 0).length} credit transactions</div>
      </div>
      <div class="kpi-card negative">
        <div class="kpi-label">Total Outflows</div>
        <div class="kpi-value neg">${formatAED(outflows)}</div>
        <div class="kpi-sub">${rows.filter(r => r.debit < 0).length} debit transactions</div>
      </div>
      <div class="kpi-card ${net >= 0 ? 'positive' : 'negative'}">
        <div class="kpi-label">Net Cash Flow</div>
        <div class="kpi-value ${net >= 0 ? 'pos' : 'neg'}">${formatAED(net)}</div>
        <div class="kpi-sub">${net >= 0 ? 'Surplus' : 'Deficit'} for period</div>
      </div>
      <div class="kpi-card accent">
        <div class="kpi-label">Closing Balance</div>
        <div class="kpi-value">${formatAED(closing)}</div>
        <div class="kpi-sub">as of ${formatDate(state.rawData[state.rawData.length - 1].date)}</div>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Transactions</div>
        <div class="kpi-value">${formatNumber(rows.length)}</div>
        <div class="kpi-sub">${(rows.length / monthCount).toFixed(1)} per month avg</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Avg Monthly Inflow</div>
        <div class="kpi-value pos">${formatAED(avgIn)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Avg Monthly Outflow</div>
        <div class="kpi-value neg">${formatAED(avgOut)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Positive-Net Months</div>
        <div class="kpi-value">${posMonths} <span style="font-size:14px;color:var(--text-muted)">/ ${monthCount}</span></div>
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Monthly Inflows vs Outflows</div>
          <div class="panel-sub">Bars: gross flows · Line: net</div>
        </div>
        <div class="chart-wrap tall"><canvas id="chart-monthly"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Outflows by Type</div>

      </div>

    <div class="subsection-title">Key insights</div>

function computeClosingBalance() {
  // Closing balance at end of selected period:
  // = last running balance within monthTo (from full data)
  const to = state.filters.monthTo;
  if (!to) return 0;
  const slice = state.rawData.filter(r => r.monthKey <= to);
  if (slice.length === 0) return 0;
  return slice[slice.length - 1].runningBalance;
}

function renderMonthlyBarChart(id, rows, monthKeys) {
  const byMonth = groupBy(rows, r => r.monthKey);
  const inflows = monthKeys.map(mk => sumInflows(byMonth.get(mk) || []));
  const outflows = monthKeys.map(mk => Math.abs(sumOutflows(byMonth.get(mk) || []))); // show positive
  const net = monthKeys.map(mk => netFlow(byMonth.get(mk) || []));
  createChart(id, {

    data: {
      labels: monthKeys.map(formatMonthLabel),

        { label: 'Inflows', data: inflows, backgroundColor: '#166534', borderRadius: 3, order: 2 },
        { label: 'Outflows', data: outflows, backgroundColor: '#991B1B', borderRadius: 3, order: 2 },
        { label: 'Net flow', data: net, type: 'line', borderColor: '#A8431B', backgroundColor: '#A8431B',
          tension: 0.25, pointRadius: 4, pointHoverRadius: 6, borderWidth: 2, order: 1 }
      ]
    },
    options: {
      plugins: { legend: { position: 'top', align: 'end' } },

function renderOutflowsByRemarkChart(id, rows) {
  // Group outflows (debit < 0) by the Remarks field (which contains
  // expense-type categorization: Rent, Payroll, Tickets, etc.)
  const agg = new Map();
  rows.forEach(r => {
    if (r.debit >= 0) return;
    let key = (r.remarks || '').trim();
    if (key === '' || key === '--' || key === '-') key = 'Uncategorized';
    agg.set(key, (agg.get(key) || 0) + Math.abs(r.debit));
  });
  const sorted = Array.from(agg.entries()).sort((a, b) => b[1] - a[1]);
  const TOP_N = 8;
  let display;
  if (sorted.length > TOP_N) {
    const top = sorted.slice(0, TOP_N);
    const otherSum = sorted.slice(TOP_N).reduce((s, [, v]) => s + v, 0);
    display = [...top, ['Other', otherSum]];
  } else {
    display = sorted;
  }
  // Warm palette for expenses — terracotta, brick, ochre, charcoal
  const palette = ['#991B1B', '#A8431B', '#B45309', '#7C2D12', '#92400E',
                   '#525252', '#4B5563', '#6B7280', '#374151'];
  createChart(id, {
    type: 'doughnut',
    data: {
      labels: display.map(([k]) => k),
      datasets: [{
        data: display.map(([, v]) => v),
        backgroundColor: display.map((_, i) => palette[i % palette.length]),
        borderColor: '#FAFAF7',
        borderWidth: 2
      }]
    },
    options: {
      cutout: '62%',
      plugins: {
        legend: { position: 'bottom' },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
              const pct = total > 0 ? (ctx.parsed / total * 100).toFixed(1) : '0';
              return `${ctx.label}: ${formatAED(ctx.parsed)} (${pct}%)`;
            }
          }
        }
      }
    }
  });
}

function renderOverviewInsights(rows, monthKeys) {
  const container = document.getElementById('overview-insights');
  const insights = [];

  // Best month by net
  const byMonth = groupBy(rows, r => r.monthKey);
  let bestMonth = null, bestNet = -Infinity;
  let worstMonth = null, worstNet = Infinity;
  monthKeys.forEach(mk => {
    const n = netFlow(byMonth.get(mk) || []);
    if (n > bestNet) { bestNet = n; bestMonth = mk; }
    if (n < worstNet) { worstNet = n; worstMonth = mk; }
  });
  if (bestMonth) {
    insights.push({
      cls: bestNet >= 0 ? 'pos' : '',
      label: 'Best month by net flow',
      text: `<strong>${formatMonthLabel(bestMonth)}</strong> with net ${formatAED(bestNet)}`
    });
  }
  if (worstMonth && worstMonth !== bestMonth) {
    insights.push({
      cls: worstNet < 0 ? 'neg' : '',
      label: 'Weakest month by net flow',
      text: `<strong>${formatMonthLabel(worstMonth)}</strong> with net ${formatAED(worstNet)}`
    });
  }

  // Largest single expense
  let largestExp = null;
  rows.forEach(r => { if (!largestExp || r.debit < largestExp.debit) largestExp = r; });
  if (largestExp && largestExp.debit < 0) {
    insights.push({
      cls: 'neg',
      label: 'Largest single expense',
      text: `<strong>${formatAED(largestExp.debit)}</strong> to ${largestExp.vendor || 'unknown'} on ${formatDate(largestExp.date)} (${largestExp.type})`
    });
  }

  // Largest single inflow
  let largestIn = null;
  rows.forEach(r => { if (!largestIn || r.credit > largestIn.credit) largestIn = r; });
  if (largestIn && largestIn.credit > 0) {
    insights.push({
      cls: 'pos',
      label: 'Largest single inflow',
      text: `<strong>${formatAED(largestIn.credit)}</strong> from ${largestIn.vendor || 'unknown'} on ${formatDate(largestIn.date)} (${largestIn.type})`
    });
  }

  // UBO share of outflows
  const totalOut = Math.abs(sumOutflows(rows));
  const uboOut = Math.abs(sumOutflows(rows.filter(r => r.project === 'UBO')));
  if (totalOut > 0 && uboOut > 0) {
    const pct = uboOut / totalOut * 100;
    insights.push({
      cls: pct > 40 ? 'warn' : '',
      label: 'UBO share of outflows',
      text: `Owner-level transactions represent <strong>${formatPercent(pct)}</strong> of all outflows (${formatAED(uboOut)})`
    });
  }

  // Sales as % of inflows
  const totalIn = sumInflows(rows);
  const salesIn = rows.filter(r => r.type === 'Sales').reduce((s, r) => s + r.credit, 0);
  if (totalIn > 0) {
    insights.push({
      cls: 'pos',
      label: 'Sales share of inflows',
      text: `<strong>${formatPercent(salesIn / totalIn * 100)}</strong> of inflows come from Sales (${formatAED(salesIn)})`
    });
  }

  container.innerHTML = insights.map(i => `
    <div class="insight ${i.cls}">
      <div class="insight-label">${i.label}</div>
      <div class="insight-text">${i.text}</div>
    </div>
  `).join('');
}

function renderRunningBalanceChart(id, rows) {
  // Use filtered rows, but compute running balance afresh from start of period
  // Actually we want the actual recorded running balance for accuracy
  const sorted = [...rows].sort((a, b) => a.date - b.date || a.num - b.num);
  const labels = sorted.map(r => formatDate(r.date));
  const data = sorted.map(r => r.runningBalance);

  // Find extreme points
  let maxCredit = null, maxDebit = null;
  sorted.forEach(r => {
    if (!maxCredit || r.credit > maxCredit.credit) maxCredit = r;
    if (!maxDebit || r.debit < maxDebit.debit) maxDebit = r;
  });
  const pointBg = sorted.map(r => {
    if (r === maxCredit) return '#166534';
    if (r === maxDebit) return '#991B1B';
    return '#A8431B';
  });
  const pointRadius = sorted.map(r => (r === maxCredit || r === maxDebit) ? 6 : 0);

  createChart(id, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Running Balance',
        data: data,
        borderColor: '#A8431B',
        backgroundColor: 'rgba(168, 67, 27, 0.06)',
        fill: true,
        tension: 0.15,
        pointRadius: pointRadius,
        pointBackgroundColor: pointBg,
        pointHoverRadius: 6,
        borderWidth: 2
      }]
    },
    options: {
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: (items) => items[0] ? sorted[items[0].dataIndex] ? formatDate(sorted[items[0].dataIndex].date) : '' : '',
            label: (ctx) => {
              const r = sorted[ctx.dataIndex];
              const lines = [`Balance: ${formatAED(r.runningBalance)}`];
              if (r.credit > 0) lines.push(`+ ${formatAED(r.credit)} from ${r.vendor || 'unknown'}`);
              if (r.debit < 0) lines.push(`${formatAED(r.debit)} to ${r.vendor || 'unknown'}`);
              return lines;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            autoSkip: true,
            maxRotation: 0,
            callback: function(val, idx) {
              // Show only ~8 ticks
              const total = this.chart.data.labels.length;
              const step = Math.max(1, Math.ceil(total / 8));
              return idx % step === 0 ? this.chart.data.labels[idx] : '';
            }
          }
        }
      }
    }
  });
}

function renderNetFlowChart(id, rows) {
  const monthKeys = monthsInRange(state.filters.monthFrom, state.filters.monthTo);
  const byMonth = groupBy(rows, r => r.monthKey);
  const net = monthKeys.map(mk => netFlow(byMonth.get(mk) || []));
  const colors = net.map(v => v >= 0 ? '#166534' : '#991B1B');

  createChart(id, {
    type: 'bar',
    data: {
      labels: monthKeys.map(formatMonthLabel),
      datasets: [{ label: 'Net flow', data: net, backgroundColor: colors, borderRadius: 4 }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        y: {
          ticks: { callback: v => formatAED(v, { compact: true }) }
        }
      }
    }
  });
}

function renderMonthlySummaryTable(rows, container) {
  const monthKeys = monthsInRange(state.filters.monthFrom, state.filters.monthTo);
  const byMonth = groupBy(rows, r => r.monthKey);
  // Opening for first month = closing of previous-month full data
  let prevClose = monthKeys.length > 0 ? getClosingBalanceBefore(monthKeys[0]) : 0;
  const rowsHtml = monthKeys.map(mk => {
    const mr = byMonth.get(mk) || [];
    const inn = sumInflows(mr);
    const out = sumOutflows(mr);
    const net = inn + out;
    const opening = prevClose;
    const closing = opening + net;
    prevClose = closing;
    const rowCls = net < 0 ? 'row-net-neg' : '';
    return `<tr class="${rowCls}">
      <td>${formatMonthLabel(mk)}</td>
      <td class="numeric">${formatAED(opening)}</td>
      <td class="numeric pos">${formatAED(inn)}</td>
      <td class="numeric neg">${formatAED(out)}</td>
      <td class="numeric ${net >= 0 ? 'pos' : 'neg'}">${formatAED(net)}</td>
      <td class="numeric">${formatAED(closing)}</td>
    </tr>`;
  }).join('');
  container.innerHTML = `
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr>
          <th>Month</th>
          <th class="numeric">Opening</th>
          <th class="numeric">Inflows</th>
          <th class="numeric">Outflows</th>
          <th class="numeric">Net</th>
          <th class="numeric">Closing</th>
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>
  `;
}

function getClosingBalanceBefore(monthKey) {
  // Closing balance from the FULL dataset, last row before this month starts
  const prior = state.rawData.filter(r => r.monthKey < monthKey);
  if (prior.length === 0) return 0;
  return prior[prior.length - 1].runningBalance;
}

      <div class="panel">
        <div class="panel-header"><div class="panel-title">Monthly Flow — ${project}</div></div>
        <div class="chart-wrap"><canvas id="chart-pd-monthly"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-header"><div class="panel-title">Composition by Type</div></div>
        <div class="chart-wrap"><canvas id="chart-pd-types"></canvas></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><div class="panel-title">Top vendors — ${project}</div></div>
      <div id="pd-vendors"></div>
    </div>
  `;

  // Monthly
  const byMonth = groupBy(pr, r => r.monthKey);
  const inflows = monthKeys.map(mk => sumInflows(byMonth.get(mk) || []));
  const outflows = monthKeys.map(mk => Math.abs(sumOutflows(byMonth.get(mk) || [])));
  createChart('chart-pd-monthly', {
    type: 'bar',
    data: {
      labels: monthKeys.map(formatMonthLabel),
      datasets: [
        { label: 'Inflows', data: inflows, backgroundColor: '#166534', borderRadius: 3 },
        { label: 'Outflows', data: outflows, backgroundColor: '#991B1B', borderRadius: 3 }
      ]
    },
    options: { plugins: { legend: { position: 'top', align: 'end' } } }
  });

  // Type composition (absolute amounts)
  const typeAgg = {};
  pr.forEach(r => {
    if (!r.type) return;
    typeAgg[r.type] = (typeAgg[r.type] || 0) + Math.abs(r.amount);
  });
  const typeEntries = Object.entries(typeAgg).filter(([k, v]) => v > 0);
  createChart('chart-pd-types', {
    type: 'doughnut',
    data: {
      labels: typeEntries.map(([k]) => k),
      datasets: [{
        data: typeEntries.map(([, v]) => v),
        backgroundColor: typeEntries.map(([k]) => COLORS[k] || COLORS.Neutral),
        borderColor: '#FAFAF7', borderWidth: 2
      }]
    },
    options: {
      cutout: '62%',
      plugins: {
        legend: { position: 'bottom' },
        tooltip: {
          callbacks: {
            label: ctx => {
              const tot = ctx.dataset.data.reduce((a,b)=>a+b,0);
              const pct = tot > 0 ? (ctx.parsed / tot * 100).toFixed(1) : '0';
              return `${ctx.label}: ${formatAED(ctx.parsed)} (${pct}%)`;
            }
          }
        }
      }
    }
  });

  // Top vendors (by absolute amount)
  const vAgg = new Map();
  pr.forEach(r => {
    if (!r.vendor) return;
    if (!vAgg.has(r.vendor)) vAgg.set(r.vendor, { inn: 0, out: 0, n: 0 });
    const v = vAgg.get(r.vendor);
    v.inn += r.credit; v.out += r.debit; v.n++;
  });
  const top = Array.from(vAgg.entries())
    .map(([name, v]) => ({ name, ...v, abs: v.inn + Math.abs(v.out) }))
    .sort((a, b) => b.abs - a.abs)
    .slice(0, 5);
  const rowsHtml = top.map(v => `
    <tr>
      <td>${escapeHtml(v.name)}</td>
      <td class="numeric pos">${v.inn > 0 ? formatAED(v.inn) : '—'}</td>
      <td class="numeric neg">${v.out < 0 ? formatAED(v.out) : '—'}</td>
      <td class="numeric">${formatAED(v.inn + v.out)}</td>
      <td class="numeric muted">${v.n}</td>
    </tr>
  `).join('');
  document.getElementById('pd-vendors').innerHTML = `
    <div class="table-wrap"><table class="data-table">
      <thead><tr>
        <th>Vendor</th>
        <th class="numeric">Inflows</th>
        <th class="numeric">Outflows</th>
        <th class="numeric">Net</th>
        <th class="numeric">Tx</th>
      </tr></thead>
      <tbody>${rowsHtml || '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">No vendor data</td></tr>'}</tbody>
    </table></div>
  `;
}

// ============================================================
// TAB: VENDORS
// ============================================================
function renderVendors(rows) {
  const el = document.getElementById('tab-vendors');
  destroyChartsIn('tab-vendors');

  // Aggregate per vendor
  const map = new Map();
  rows.forEach(r => {
    const name = r.vendor || '(no vendor)';
    if (!map.has(name)) map.set(name, { name, inn: 0, out: 0, n: 0, projects: new Set(), types: new Set(), txs: [] });
    const v = map.get(name);
    v.inn += r.credit;
    v.out += r.debit;
    v.n += 1;
    if (r.project) v.projects.add(r.project);
    if (r.type) v.types.add(r.type);
    v.txs.push(r);
  });
  const allVendors = Array.from(map.values()).map(v => ({
    ...v,
    net: v.inn + v.out,
    absTotal: v.inn + Math.abs(v.out)
  }));

  // Top 10 chart
  const top10 = [...allVendors].sort((a, b) => b.absTotal - a.absTotal).slice(0, 10);

  // Concentration: top 5 share of outflows
  const totalOut = Math.abs(rows.reduce((s, r) => s + r.debit, 0));
  const top5OutShare = [...allVendors].sort((a, b) => Math.abs(b.out) - Math.abs(a.out))
    .slice(0, 5).reduce((s, v) => s + Math.abs(v.out), 0);
  const top5Pct = totalOut > 0 ? top5OutShare / totalOut * 100 : 0;

  el.innerHTML = `
    <div class="section-title">Vendors</div>
    <div class="section-sub">${allVendors.length} unique counterparties in selected period</div>

    <div class="callout">
      <div class="callout-title">Vendor concentration</div>
      <div class="callout-text">Top 5 vendors account for <strong>${formatPercent(top5Pct)}</strong> of all outflows (${formatAED(top5OutShare)} of ${formatAED(totalOut)}).</div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Top 10 vendors by absolute volume</div>
        <div class="panel-sub">Inflows + |Outflows|</div>
      </div>
      <div class="chart-wrap tall"><canvas id="chart-top-vendors"></canvas></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">All vendors</div>
        <div class="panel-sub">Click a row to expand transactions</div>
      </div>
      <div class="table-controls">
        <input type="text" class="search-input" id="vendor-search" placeholder="Search vendor name…" value="${escapeAttr(state.vendorSearch)}" />
        <span class="row-count" id="vendor-count"></span>
      </div>
      <div class="table-wrap"><table class="data-table" id="vendor-table"></table></div>
      <div class="pagination" id="vendor-pagination"></div>
    </div>
  `;

  // Top vendors chart (horizontal)
  createChart('chart-top-vendors', {
    type: 'bar',
    data: {
      labels: top10.map(v => v.name.length > 30 ? v.name.slice(0,28) + '…' : v.name),
      datasets: [{
        label: 'Absolute volume',
        data: top10.map(v => v.absTotal),
        backgroundColor: top10.map(v => v.net >= 0 ? '#166534' : '#991B1B'),
        borderRadius: 3
      }]
    },
    options: {
      indexAxis: 'y',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const v = top10[ctx.dataIndex];
              return [
                `Inflows: ${formatAED(v.inn)}`,
                `Outflows: ${formatAED(v.out)}`,
                `Net: ${formatAED(v.net)}`,
                `${v.n} transactions`
              ];
            }
          }
        }
      },
      scales: {
        x: { ticks: { callback: v => formatAED(v, { compact: true }) }, grid: { color: '#E7E4DC' } },
        y: { grid: { display: false } }
      }
    }
  });

  // Vendor table
  state.vendorSearch = state.vendorSearch || '';
  renderVendorTable(allVendors);

  document.getElementById('vendor-search').addEventListener('input', (e) => {
    state.vendorSearch = e.target.value;
    state.vendorPage = 1;
    renderVendorTable(allVendors);
  });
}

function renderVendorTable(allVendors) {
  const tbl = document.getElementById('vendor-table');
  if (!tbl) return;

  const q = state.vendorSearch.trim().toLowerCase();
  const filtered = q
    ? allVendors.filter(v => v.name.toLowerCase().includes(q))
    : allVendors;

  // Sort
  const { key, dir } = state.vendorSort;
  const mult = dir === 'asc' ? 1 : -1;
  filtered.sort((a, b) => {
    let av = a[key], bv = b[key];
    if (typeof av === 'string') return av.localeCompare(bv) * mult;
    return ((av || 0) - (bv || 0)) * mult;
  });

  // Pagination
  const total = filtered.length;
  const pageSize = state.vendorPageSize;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  if (state.vendorPage > totalPages) state.vendorPage = totalPages;
  const pageRows = filtered.slice((state.vendorPage - 1) * pageSize, state.vendorPage * pageSize);

  const head = [
    { k: 'name', label: 'Vendor', cls: '' },
    { k: 'inn', label: 'Inflows', cls: 'numeric' },
    { k: 'out', label: 'Outflows', cls: 'numeric' },
    { k: 'net', label: 'Net', cls: 'numeric' },
    { k: 'n', label: 'Tx', cls: 'numeric' },
    { k: 'projects', label: 'Projects', cls: '' },
    { k: 'types', label: 'Types', cls: '' }
  ];
  const theadHtml = head.map(h => {
    const sorted = state.vendorSort.key === h.k;
    return `<th class="${h.cls}${sorted ? ' sorted' + (state.vendorSort.dir === 'asc' ? ' asc' : '') : ''}" data-key="${h.k}">${h.label}</th>`;
  }).join('');

  const bodyHtml = pageRows.map((v, i) => {
    const expandedClass = state.vendorExpanded === v.name ? ' style="background:var(--surface-alt)"' : '';
    const expanded = state.vendorExpanded === v.name ? `
      <tr class="subrow"><td colspan="${head.length}">
        <div class="subrow-inner">
          <table>
            <thead><tr>
              <th>Date</th><th>Type</th><th>Project</th><th class="numeric">Debit</th><th class="numeric">Credit</th><th>Invoice</th><th>Remarks</th>
            </tr></thead>
            <tbody>${v.txs.sort((a,b)=>b.date-a.date).map(t => `
              <tr>
                <td>${formatDate(t.date)}</td>
                <td>${escapeHtml(t.type)}</td>
                <td><span class="badge ${t.project.toLowerCase()}">${escapeHtml(t.project)}</span></td>
                <td class="numeric neg">${t.debit < 0 ? formatAED(t.debit) : ''}</td>
                <td class="numeric pos">${t.credit > 0 ? formatAED(t.credit) : ''}</td>
                <td>${escapeHtml(t.invoice)}</td>
                <td class="muted">${escapeHtml(t.remarks)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </td></tr>
    ` : '';
    return `
      <tr data-vendor="${escapeAttr(v.name)}"${expandedClass}>
        <td>${escapeHtml(v.name)}</td>
        <td class="numeric pos">${v.inn > 0 ? formatAED(v.inn) : '—'}</td>
        <td class="numeric neg">${v.out < 0 ? formatAED(v.out) : '—'}</td>
        <td class="numeric ${v.net >= 0 ? 'pos' : 'neg'}">${formatAED(v.net)}</td>
        <td class="numeric muted">${v.n}</td>
        <td>${Array.from(v.projects).map(p => `<span class="badge ${p.toLowerCase()}">${p}</span>`).join(' ')}</td>
        <td><span class="muted" style="font-size:11px">${Array.from(v.types).join(', ')}</span></td>
      </tr>
      ${expanded}
    `;
  }).join('');

  tbl.innerHTML = `<thead><tr>${theadHtml}</tr></thead><tbody>${bodyHtml}</tbody>`;

  // Wire up sort
  tbl.querySelectorAll('th[data-key]').forEach(th => {
    th.onclick = () => {
      const k = th.getAttribute('data-key');
      if (state.vendorSort.key === k) {
        state.vendorSort.dir = state.vendorSort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        state.vendorSort.key = k;
        state.vendorSort.dir = (k === 'name') ? 'asc' : 'desc';
      }
      renderVendorTable(allVendors);
    };
  });

  // Wire up row expand
  tbl.querySelectorAll('tr[data-vendor]').forEach(tr => {
    tr.onclick = () => {
      const name = tr.getAttribute('data-vendor');
      state.vendorExpanded = state.vendorExpanded === name ? null : name;
      renderVendorTable(allVendors);
    };
    tr.style.cursor = 'pointer';
  });

  // Count
  document.getElementById('vendor-count').textContent = `Showing ${pageRows.length} of ${total} vendors`;

  // Pagination
  const pag = document.getElementById('vendor-pagination');
  pag.innerHTML = `
    <button ${state.vendorPage <= 1 ? 'disabled' : ''} id="vp-prev">Prev</button>
    <span>Page ${state.vendorPage} of ${totalPages}</span>
    <button ${state.vendorPage >= totalPages ? 'disabled' : ''} id="vp-next">Next</button>
  `;
  const prev = document.getElementById('vp-prev');
  const next = document.getElementById('vp-next');
  if (prev) prev.onclick = () => { if (state.vendorPage > 1) { state.vendorPage--; renderVendorTable(allVendors); } };
  if (next) next.onclick = () => { if (state.vendorPage < totalPages) { state.vendorPage++; renderVendorTable(allVendors); } };
}

// ============================================================
// TAB: TRANSACTIONS
// ============================================================
function renderTransactions(rows) {
  const el = document.getElementById('tab-transactions');
  destroyChartsIn('tab-transactions');

  el.innerHTML = `
    <div class="section-title">Transactions</div>
    <div class="section-sub">Complete transaction ledger · ${rows.length} rows after filters</div>

    <div class="panel">
      <div class="table-controls">
        <input type="text" class="search-input" id="tx-search" placeholder="Search vendor, invoice, type, comments…" value="${escapeAttr(state.txSearch)}" />
        <button class="btn primary" id="tx-export">Export CSV</button>
        <span class="row-count" id="tx-count"></span>
      </div>
      <div class="table-wrap"><table class="data-table" id="tx-table"></table></div>
      <div class="pagination" id="tx-pagination"></div>
    </div>
  `;

  renderTxTable(rows);

  document.getElementById('tx-search').addEventListener('input', (e) => {
    state.txSearch = e.target.value;
    state.txPage = 1;
    renderTxTable(rows);
  });
  document.getElementById('tx-export').addEventListener('click', () => exportCSV(getFilteredTxRows(rows)));
}

function getFilteredTxRows(rows) {
  const q = state.txSearch.trim().toLowerCase();
  if (!q) return rows;
  return rows.filter(r =>
    (r.vendor && r.vendor.toLowerCase().includes(q)) ||
    (r.invoice && r.invoice.toLowerCase().includes(q)) ||
    (r.remarks && r.remarks.toLowerCase().includes(q)) ||
    (r.comments && r.comments.toLowerCase().includes(q))
  );
}

function renderTxTable(rows) {
  const filtered = getFilteredTxRows(rows);
  const { key, dir } = state.txSort;
  const mult = dir === 'asc' ? 1 : -1;
  const sorted = [...filtered].sort((a, b) => {
    let av = a[key], bv = b[key];
    if (av instanceof Date) av = av.getTime();
    if (bv instanceof Date) bv = bv.getTime();
    if (typeof av === 'string') return av.localeCompare(bv) * mult;
    return ((av || 0) - (bv || 0)) * mult;
  });

  const total = sorted.length;
  const pageSize = state.txPageSize;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  if (state.txPage > totalPages) state.txPage = totalPages;
  const pageRows = sorted.slice((state.txPage - 1) * pageSize, state.txPage * pageSize);

  const head = [
    { k: 'date', label: 'Date', cls: '' },
    { k: 'type', label: 'Category', cls: '' },
    { k: 'project', label: 'Project', cls: '' },
    { k: 'debit', label: 'Debit', cls: 'numeric' },
    { k: 'credit', label: 'Credit', cls: 'numeric' },
    { k: 'runningBalance', label: 'Balance', cls: 'numeric' },
    { k: 'vendor', label: 'Vendor', cls: '' },
    { k: 'invoice', label: 'Invoice', cls: '' },
    { k: 'remarks', label: 'Subcategory', cls: '' },
    { k: 'comments', label: 'Comments', cls: '' }
  ];

  const tbl = document.getElementById('tx-table');
  const theadHtml = head.map(h => {
    const sorted = state.txSort.key === h.k;
    return `<th class="${h.cls}${sorted ? ' sorted' + (state.txSort.dir === 'asc' ? ' asc' : '') : ''}" data-key="${h.k}">${h.label}</th>`;
  }).join('');

  const bodyHtml = pageRows.map(r => {
    const rowCls = r.credit > 0 ? 'row-credit' : (r.debit < 0 ? 'row-debit' : '');
    const warn = r.detailsNeeded ? '<span class="warn-icon" title="Details needed">⚠</span>' : '';
    const remarksDisplay = (r.remarks === '--' || r.remarks === '-') ? '' : r.remarks;
    return `<tr class="${rowCls}">
      <td>${warn}${formatDate(r.date)}</td>
      <td>${escapeHtml(r.type)}</td>
      <td><span class="badge ${r.project.toLowerCase()}">${escapeHtml(r.project)}</span></td>
      <td class="numeric neg">${r.debit < 0 ? formatAED(r.debit) : ''}</td>
      <td class="numeric pos">${r.credit > 0 ? formatAED(r.credit) : ''}</td>
      <td class="numeric">${formatAED(r.runningBalance)}</td>
      <td>${escapeHtml(r.vendor)}</td>
      <td class="muted">${escapeHtml(r.invoice)}</td>
      <td>${escapeHtml(remarksDisplay)}</td>
      <td class="muted">${escapeHtml(r.comments)}</td>
    </tr>`;
  }).join('');

  tbl.innerHTML = `<thead><tr>${theadHtml}</tr></thead><tbody>${bodyHtml}</tbody>`;

  tbl.querySelectorAll('th[data-key]').forEach(th => {
    th.onclick = () => {
      const k = th.getAttribute('data-key');
      if (state.txSort.key === k) {
        state.txSort.dir = state.txSort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        state.txSort.key = k;
        state.txSort.dir = (['debit','credit','date','runningBalance'].includes(k)) ? 'desc' : 'asc';
      }
      renderTxTable(rows);
    };
  });

  document.getElementById('tx-count').textContent = `Showing ${pageRows.length} of ${total} transactions`;
  const pag = document.getElementById('tx-pagination');
  pag.innerHTML = `
    <button ${state.txPage <= 1 ? 'disabled' : ''} id="tx-prev">Prev</button>
    <span>Page ${state.txPage} of ${totalPages}</span>
    <button ${state.txPage >= totalPages ? 'disabled' : ''} id="tx-next">Next</button>
  `;
  const prev = document.getElementById('tx-prev');
  const next = document.getElementById('tx-next');
  if (prev) prev.onclick = () => { if (state.txPage > 1) { state.txPage--; renderTxTable(rows); } };
  if (next) next.onclick = () => { if (state.txPage < totalPages) { state.txPage++; renderTxTable(rows); } };
}

function exportCSV(rows) {
  const headers = ['Date','Type','Class','Project','Debit','Credit','Running Balance','Vendor','Invoice','Remarks','Comments'];
  const csvLines = [headers.join(',')];
  rows.forEach(r => {
    const cells = [
      formatDate(r.date),
      r.type,
      r.class,
      r.project,
      r.debit,
      r.credit,
      r.runningBalance,
      r.vendor,
      r.invoice,
      r.remarks,
      r.comments
    ].map(v => {
      const s = v == null ? '' : String(v);
      return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    });
    csvLines.push(cells.join(','));
  });
  const blob = new Blob([csvLines.join('\n')], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `avp-transactions-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============================================================
// UTILITIES
// ============================================================
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function escapeAttr(s) {
  if (s == null) return '';
  return String(s).replace(/"/g, '&quot;').replace(/&/g, '&amp;');
}

// ============================================================
// RETRY BUTTON
// ============================================================
document.getElementById('retry-btn').addEventListener('click', loadData);

// ============================================================
// BOOT
// ============================================================
setupTabs();
setupPassword();
</script>
